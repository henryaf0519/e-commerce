<div class="flex min-h-screen flex-col">
    <app-header></app-header> 

    <div class="flex-1 bg-gray-50">
      <div class="mx-auto max-w-7xl px-2 sm:px-6 lg:px-8 min-h-[61.9vh]">
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 my-6">
           <app-card *ngFor="let product of products" [products]="product" (productClicked)="onProductClicked(product)"></app-card>
        </div>
      </div>
    </div>

    <ng-container *ngIf="cart$ | async as cartState">
      <div class="cont2 w-80 fixed right-0 top-0 h-full bg-white shadow-2xl p-4 overflow-auto z-50 transform transition-transform duration-300" 
           *ngIf="cartState.items.length > 0">
        
        <div class="flex justify-between items-center mb-6 border-b pb-2 border-secondary/10">
          <h3 class="text-xl font-bold text-secondary">Tu Carrito</h3>
        </div>
        
        <div class="space-y-4">
          <div *ngFor="let item of cartState.items" class="flex items-center justify-between">
            <img [src]="item.images" alt="{{ item.name }}" class="w-16 h-16 object-cover rounded-md border border-gray-200">
            <div class="flex flex-col items-end">
              <span class="text-sm font-medium text-gray-800">{{ item.name }}</span>
              <span class="text-xs text-primary font-bold">Cant: {{ item.quantity }}</span>
              <span class="text-sm text-gray-600">${{ item.price * item.quantity | number: '1.2-2' }}</span>
            </div>
          </div>
        </div>

        <div class="mt-6 pt-4 border-t border-gray-100">
          <div class="flex justify-between mb-4">
            <span class="font-bold text-lg text-secondary">Total:</span>
            <span class="font-bold text-lg text-primary">${{ totalPrice$ | async }}</span>
          </div>
          
          <button (click)="goToCart()" 
                  class="w-full py-3 bg-primary text-white font-semibold rounded-lg hover:brightness-110 transition duration-300 shadow-lg glow-effect">
              Ir a Pagar
          </button>
        </div>
      </div>
    </ng-container>
    
    <app-footer></app-footer>
</div>
