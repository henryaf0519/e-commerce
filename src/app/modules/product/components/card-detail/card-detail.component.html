<app-header></app-header>

<div *ngIf="!loading && product; else loader" class="mx-auto max-w-7xl px-2 sm:px-6 lg:px-8 rounded-lg shadow-lg my-6 p-6 min-h-[61.9vh]">
  
  <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
    <app-carousel [images]="product.images" class="rounded-xl overflow-hidden"></app-carousel>

    <div class="space-y-6">
      <h1 class="text-4xl font-bold text-gray-900 tracking-tight">{{ product.name }}</h1>
      <p class="text-lg text-gray-600 mt-4">{{ product.description }}</p>

      <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
        <label class="block text-sm font-medium text-gray-700 mb-2">Cantidad a comprar:</label>
        
        <div class="flex items-center space-x-4">
          
          <div class="relative">
            <select 
              [value]="selectedOptions.quantity"
              (change)="updateQuantitySelect($event)"
              class="appearance-none w-24 bg-white border border-gray-300 text-gray-700 py-2 px-3 pr-8 rounded leading-tight focus:outline-none focus:bg-white focus:border-blue-500 cursor-pointer shadow-sm"
            >
              <option *ngFor="let num of getStockArray()" [value]="num">
                {{ num }}
              </option>
            </select>
            
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-700">
              <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/>
              </svg>
            </div>
          </div>
          
          <span class="text-sm font-medium" 
                [ngClass]="{'text-green-600': product.stock > 5, 'text-red-500 font-bold': product.stock <= 5}">
            (Disponibles: {{ product.stock }})
          </span>
        </div>
      </div>
      <div class="flex items-center space-x-4">
        <div class="text-3xl font-semibold text-gray-900">${{ product.price }}</div>
        <div class="text-sm text-gray-500 line-through">${{ (product.price * 1.2).toFixed(2) }}</div>
      </div>

      <button 
        class="w-full py-3 bg-blueMain text-white rounded-lg hover:bg-blue-700 transition duration-300 transform hover:scale-105 disabled:bg-gray-400 disabled:scale-100 disabled:cursor-not-allowed" 
        (click)="addToCart()"
        [disabled]="product.stock === 0">
        {{ product.stock > 0 ? 'Add to Cart' : 'Out of Stock' }}
      </button>
      
    </div>
  </div>

  <div class="mt-12">
    <h2 class="text-2xl font-semibold text-gray-800 mb-4">Product Details</h2>
    <ul class="list-disc pl-6 text-gray-600 space-y-2">
      <li>Round Toe Design</li>
      <li>PU Upper, Fabric Lining</li>
      <li>Slip-on Style</li>
      <li>Rubber Sole</li>
    </ul>
  </div>
</div>

<ng-template #loader>
  <div class="flex justify-center items-center min-h-[60vh]">
    <div class="flex flex-col items-center space-y-4">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blueMain"></div>
      <p class="text-gray-500 text-lg">Cargando producto...</p>
    </div>
  </div>
</ng-template>

<div *ngIf="showModal"
     @modalAnimation
     class="fixed top-0 left-0 w-full h-full bg-opacity-50 bg-gray-900 flex justify-center items-center z-50">
  <div class="bg-gray-50 rounded-lg shadow-xl p-4 flex flex-col items-center space-y-4 max-w-sm w-full">
    <div class="text-green-500 text-3xl">
      <i class="fas fa-check-circle"></i>
    </div>
    <p class="text-sm font-semibold text-gray-900">{{message}}</p>
    <div class="flex space-x-4 mt-4">
      <button class="py-1 px-4 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition duration-300 text-sm" (click)="continueShopping()">Seguir comprando</button>
      <button class="py-1 px-4 bg-gray-800 text-white rounded-lg hover:bg-gray-700 transition duration-300 text-sm" (click)="goToCart()">Ir al Carrito</button>
    </div>
  </div>
</div>

<app-footer></app-footer>
