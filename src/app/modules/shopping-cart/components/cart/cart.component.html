<app-header></app-header>

<div class="max-w-4xl mx-auto py-8 px-4 sm:px-6 min-h-[61.9vh] bg-page" *ngIf="(cart$ | async)?.items?.length">
  <div class="bg-surface shadow-xl rounded-2xl overflow-hidden border border-muted/10">
    <div class="p-6 border-b border-muted/10 bg-page/50">
      <h1 class="text-3xl font-bold text-main">Resumen de Compra</h1>
    </div>

    <div class="divide-y divide-muted/10">
      <div *ngFor="let item of (cart$ | async)?.items" class="flex flex-col sm:flex-row items-center justify-between p-6 hover:bg-page transition-colors">
        <div class="flex items-center space-x-4 w-full sm:w-auto">
          <img [src]="item.images[0]" alt="{{ item.name }}" class="w-20 h-20 object-cover rounded-lg shadow-sm border border-muted/20">
          <div class="flex-1">
            <h3 class="text-lg font-bold text-main">{{ item.name }}</h3>
            <p class="text-sm text-muted" *ngIf="item.size || item.color">
              {{ item.size }} <span *ngIf="item.size && item.color">|</span> {{ item.color }}
            </p>
          </div>
        </div>

        <div class="flex flex-col items-end mt-4 sm:mt-0 space-y-2">
          <span class="text-xl font-bold text-brand">${{ item.price }}</span>
          <div class="flex items-center bg-page rounded-lg p-1 border border-muted/10">
            <select 
              [ngModel]="item.quantity"
              (ngModelChange)="updateQuantity(item, $event)" 
              [ngModelOptions]="{standalone: true}"
              class="bg-transparent text-sm font-medium text-main py-1 px-2 focus:outline-none cursor-pointer">
              <option *ngFor="let qty of getQuantityOptions(item)" [value]="qty">{{ qty }}</option>
            </select>
          </div>
          <button (click)="removeItem(item)" class="text-xs text-accent hover:text-red-600 underline transition-colors">
            Eliminar
          </button>
        </div>
      </div>
    </div>

    <div class="p-8 bg-page/30 border-t border-muted/20">
      <div class="flex justify-between items-end mb-6">
        <span class="text-muted">Subtotal</span>
        <span class="text-3xl font-bold text-main">${{ totalPrice$ | async }}</span>
      </div>
      
      <button class="w-full py-4 bg-brand text-inverted text-xl font-bold rounded-xl shadow-lg hover:brightness-110 focus:ring-4 focus:ring-brand/30 transition-all transform hover:-translate-y-1">
        Proceder al Pago
      </button>
    </div>
  </div>
</div>

<div *ngIf="(cart$ | async)?.items?.length === 0" class="flex flex-col items-center justify-center py-12 min-h-[60vh] text-center bg-page">
  <div class="w-24 h-24 bg-muted/10 rounded-full flex items-center justify-center mb-6">
    <i class="fas fa-shopping-bag text-4xl text-muted/50"></i>
  </div>
  <h2 class="text-2xl font-bold text-main mb-2">Tu carrito está vacío</h2>
  <p class="text-muted mb-8 max-w-sm">Parece que aún no has agregado productos. ¡Descubre nuestras novedades!</p>
  
  <a routerLink="/products" 
     class="px-8 py-3 bg-brand text-inverted font-semibold rounded-full shadow-md hover:shadow-lg hover:brightness-110 transition-all">
    Explorar Catálogo
  </a>
</div>

<app-footer></app-footer>
