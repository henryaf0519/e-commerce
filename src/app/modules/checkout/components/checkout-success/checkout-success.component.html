<div class="min-h-screen bg-page flex items-center justify-center px-4 py-12">
  <div class="max-w-md w-full space-y-6">
    
    <div class="bg-surface p-8 rounded-2xl shadow-xl text-center border border-muted/10 relative overflow-hidden">
      <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-brand to-accent"></div>

      <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6 shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
      </div>

      <h1 class="text-3xl font-bold text-main mb-2 font-heading">¡Gracias, {{ userName || 'Comprador' }}!</h1>
      <p class="text-muted mb-6">
        Tu pedido ha sido confirmado. Hemos enviado los detalles a <span class="font-bold text-main">{{ userEmail }}</span>.
      </p>

      <button 
        routerLink="/" 
        class="text-brand font-bold hover:underline text-sm"
      >
        Volver a la tienda
      </button>
    </div>

    <div *ngIf="showRegister && !isRegistered" class="bg-surface p-8 rounded-2xl shadow-lg border-2 border-brand/10 transform transition-all hover:border-brand/30">
      <div class="flex items-start space-x-4">
        <div class="bg-brand/10 p-3 rounded-full shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-brand" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
        </div>
        <div class="flex-1">
          <h3 class="text-lg font-bold text-main">Guarda tus datos para la próxima</h3>
          <p class="text-sm text-muted mb-4">
            Crea una contraseña para <strong>{{ userEmail }}</strong> y guarda tu dirección y pedidos.
          </p>

          <form [formGroup]="registerForm" (ngSubmit)="onCreateAccount()" class="space-y-3">
            <input 
              type="password" 
              formControlName="password"
              placeholder="Crea una contraseña" 
              class="w-full p-3 bg-page border border-muted/20 rounded-lg focus:border-brand outline-none text-sm transition-colors"
            >
            
            <button 
              type="submit" 
              [disabled]="registerForm.invalid"
              class="w-full py-3 bg-main text-inverted font-bold rounded-lg hover:bg-brand transition-colors shadow-md disabled:opacity-50 disabled:cursor-not-allowed text-sm"
            >
              Crear mi cuenta ahora
            </button>
          </form>
        </div>
      </div>
    </div>

    <div *ngIf="isRegistered" class="bg-brand text-inverted p-6 rounded-2xl shadow-lg text-center animate-pulse">
      <h3 class="text-xl font-bold mb-1">¡Cuenta Creada!</h3>
      <p class="text-sm opacity-90">Ahora puedes ver el historial de tus pedidos.</p>
    </div>

  </div>
</div>
