<div class="max-w-4xl mx-auto space-y-6">
  
  <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
    <h2 class="text-lg font-bold text-gray-800 mb-4">Gestionar Secciones</h2>
    <div class="flex gap-4 items-start">
      <div class="flex-1">
        <input 
          [formControl]="nameControl"
          type="text" 
          placeholder="Nombre de la nueva sección (ej. Zapatos, Camisas)"
          class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2.5 border"
          (keyup.enter)="addSection()" 
        >
        <p *ngIf="nameControl.touched && nameControl.invalid" class="text-red-500 text-xs mt-1 ml-1">
          Mínimo 3 caracteres.
        </p>
      </div>
      
      <button 
        (click)="addSection()"
        [disabled]="nameControl.invalid || loading"
        class="bg-indigo-600 text-white px-6 py-2.5 rounded-lg hover:bg-indigo-700 transition-colors disabled:opacity-50 font-medium whitespace-nowrap flex items-center"
      >
        <span *ngIf="loading" class="fas fa-spinner fa-spin mr-2"></span>
        <span *ngIf="!loading" class="fas fa-plus mr-2"></span>
        Agregar
      </button>
    </div>
  </div>

  <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
    <table class="w-full text-left text-sm text-gray-500">
      <thead class="bg-gray-50 text-xs uppercase text-gray-700">
        <tr>
          <th class="px-6 py-3">Nombre</th>
          <th class="px-6 py-3 text-right">Acciones</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200">
        <tr *ngFor="let section of sections" class="hover:bg-gray-50">
          <td class="px-6 py-4 font-medium text-gray-900 text-base">
            {{ section }}
          </td>
        </tr>
        
        <tr *ngIf="sections.length === 0">
          <td colspan="2" class="px-6 py-8 text-center text-gray-400">
            No hay secciones registradas.
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
