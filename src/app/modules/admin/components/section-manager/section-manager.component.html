<div class="max-w-4xl mx-auto space-y-6">
  
  <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
    <h2 class="text-lg font-bold text-gray-800 mb-6">Agregar Nueva Sección</h2>
    
    <form [formGroup]="sectionForm" (ngSubmit)="addSection()" class="space-y-5">
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Título <span class="text-red-500">*</span></label>
          <input formControlName="title" type="text" placeholder="Ej. The Harvest"
            class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2.5 border"
            [class.border-red-300]="sectionForm.get('title')?.invalid && sectionForm.get('title')?.touched">
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Subtítulo <span class="text-red-500">*</span></label>
          <input formControlName="subtitle" type="text" placeholder="Ej. Botanical & Heirloom"
            class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2.5 border"
            [class.border-red-300]="sectionForm.get('subtitle')?.invalid && sectionForm.get('subtitle')?.touched">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Tagline <span class="text-red-500">*</span></label>
        <input formControlName="tagline" type="text" placeholder="Ej. Rare botanical sweets..."
          class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2.5 border"
          [class.border-red-300]="sectionForm.get('tagline')?.invalid && sectionForm.get('tagline')?.touched">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Imagen de la Sección <span class="text-red-500">*</span></label>
        
        <div class="flex gap-4 items-start">
          <div *ngIf="preview" class="relative group aspect-square w-32 rounded-lg overflow-hidden border border-gray-200 bg-gray-50">
            <img [src]="preview" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center z-20">
              <button type="button" (click)="removeFile()" class="bg-white text-red-500 w-9 h-9 rounded-full flex items-center justify-center hover:bg-red-500 hover:text-white transition-all shadow-lg transform hover:scale-110">
                <i class="fas fa-trash-alt"></i>
              </button>
            </div>
          </div>

          <label *ngIf="!preview" class="flex flex-col items-center justify-center w-32 h-32 border-2 border-dashed border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50 hover:border-indigo-500 hover:text-indigo-500 transition-all group">
            <input type="file" class="hidden" accept="image/*" (change)="onFileSelect($event)">
            <div class="w-10 h-10 rounded-full bg-gray-100 group-hover:bg-indigo-50 flex items-center justify-center mb-2 transition-colors">
              <i class="fas fa-cloud-upload-alt text-gray-400 group-hover:text-indigo-500 text-lg"></i>
            </div>
            <span class="text-xs font-semibold text-gray-500 group-hover:text-indigo-500">Subir Foto</span>
          </label>
        </div>
        
        <p *ngIf="errorMessage" class="text-red-500 text-xs mt-2 flex items-center">
          <i class="fas fa-exclamation-triangle mr-1"></i> {{ errorMessage }}
        </p>
      </div>

      <div class="pt-4 border-t border-gray-100 flex justify-end">
        <button type="submit" [disabled]="sectionForm.invalid || !selectedFile || loading"
          class="bg-indigo-600 text-white px-8 py-2.5 rounded-lg hover:bg-indigo-700 transition-colors disabled:opacity-50 font-medium whitespace-nowrap flex items-center">
          <span *ngIf="loading" class="fas fa-spinner fa-spin mr-2"></span>
          <span *ngIf="!loading" class="fas fa-plus mr-2"></span>
          {{ loading ? 'Creando...' : 'Crear Sección' }}
        </button>
      </div>
    </form>
  </div>

  <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
    <table class="w-full text-left text-sm text-gray-500">
      <thead class="bg-gray-50 text-xs uppercase text-gray-700">
        <tr>
          <th class="px-6 py-3 w-24">Imagen</th>
          <th class="px-6 py-3">Detalles</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200">
        <tr *ngFor="let section of sections" class="hover:bg-gray-50">
          <td class="px-6 py-4">
            <img *ngIf="section.image" [src]="section.image" class="w-14 h-14 rounded object-cover shadow-sm">
            <div *ngIf="!section.image" class="w-14 h-14 rounded bg-gray-100 border border-gray-200 flex items-center justify-center text-gray-400">
              <i class="fas fa-image text-lg"></i>
            </div>
          </td>
          <td class="px-6 py-4">
            <div class="font-bold text-gray-900 text-base">{{ section.title }}</div>
            <div class="text-sm text-gray-600 font-medium mt-0.5">{{ section.subtitle }}</div>
            <div class="text-xs text-gray-400 mt-1 italic">{{ section.tagline }}</div>
          </td>
        </tr>
        
        <tr *ngIf="sections.length === 0">
          <td colspan="2" class="px-6 py-10 text-center text-gray-400">
            <i class="fas fa-layer-group text-3xl mb-3 block opacity-20"></i>
            No hay secciones registradas.
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
