<app-header *ngIf="!isCheckoutRoute && !isAdminRoute"></app-header>

<main class="min-h-screen bg-page relative">
  <router-outlet></router-outlet>
</main>

<div class="fixed bottom-24 right-6 md:bottom-28 md:right-6 z-50 flex flex-col items-end gap-4">
    
    <div class="relative flex flex-col items-end">
        <button
            *ngIf="isHomePage && !isCheckoutRoute && !isAdminRoute"
            (click)="toggleCart()"
            class="group relative flex items-center justify-center w-12 h-12 md:w-16 md:h-16 bg-brand text-white rounded-full shadow-xl hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1 hover:scale-110 focus:outline-none"
            aria-label="Ver carrito de compras">
            
            <span class="absolute inline-flex h-full w-full rounded-full bg-brand opacity-20 animate-ping-slow"></span>
            
            <span 
                *ngIf="(cartCount$ | async) as count" 
                class="absolute -top-1 -right-1 flex h-5 w-5 md:h-7 md:w-7 items-center justify-center rounded-full bg-accent text-[10px] md:text-xs font-bold text-white shadow-sm animate-bounce z-20">
                {{ count }}
            </span>

            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 md:h-7 md:w-7 relative z-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
            </svg>
        </button>
    </div>
</div>

<app-whatsapp></app-whatsapp>
<app-footer *ngIf="!isCheckoutRoute && !isAdminRoute"></app-footer>

<app-side-cart *ngIf="!isCheckoutRoute"></app-side-cart>
