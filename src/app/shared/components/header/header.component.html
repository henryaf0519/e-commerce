<nav class="bg-brand shadow-lg transition-colors duration-300 sticky top-0 z-50">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="relative flex h-16 items-center justify-between">
      
      <div class="flex shrink-0 items-center cursor-pointer transform hover:scale-105 transition-transform" (click)="goToHome()">
        <img class="h-10 w-auto brightness-0 invert opacity-95" src="assets/imgs/logo.png" alt="Dulcilandia">
      </div>

      <div class="flex items-center space-x-6">
        
        <button class="group relative text-inverted/80 hover:text-inverted transition-colors p-1">
            <span class="sr-only">Iniciar Sesión</span>
            <i class="fas fa-user text-2xl group-hover:drop-shadow-md transition-all"></i>
            <span class="absolute -bottom-8 left-1/2 -translate-x-1/2 text-[10px] bg-black/80 text-white px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">
                Mi Cuenta
            </span>
        </button>

        <button class="relative text-inverted/80 hover:text-inverted transition-transform transform hover:scale-110 p-1" (click)="goToCart()">
          <span class="sr-only">Ver carrito</span>
          <i class="fas fa-shopping-cart text-2xl"></i>
          
          <span *ngIf="(cart$ | async)?.items?.length" 
                class="absolute -top-1.5 -right-2 bg-accent text-inverted text-[10px] font-bold rounded-full w-5 h-5 flex items-center justify-center shadow-sm animate-bounce-in">
             {{ (cart$ | async)?.items?.length }}
          </span>
        </button>

      </div>
    </div>
  </div>
</nav>
