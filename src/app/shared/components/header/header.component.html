            <img class="h-10 w-auto brightness-0 invert opacity-90 hover:opacity-100 transition-all" src="assets/imgs/logo.png" alt="Your Company">

        <div class="w-full sm:ml-4 sm:flex sm:justify-center">

          <span class="absolute -inset-1.5"></span>
          <span class="sr-only">Ver carrito</span>
          <i class="w-5 fas fa-shopping-cart text-2xl"></i>
