<nav
  class="bg-brand shadow-lg transition-colors duration-300 sticky top-0 z-50"
>
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="relative flex h-16 items-center justify-between">
      <div
        class="flex shrink-0 items-center cursor-pointer transform hover:scale-105 transition-transform"
        (click)="goToHome()"
      >
        <img
          class="cont-img brightness-0 invert "
          src="assets/imgs/logo.png"
          alt="Dulcilandia"
        />
      </div>

      <div class="flex items-center space-x-6">
        <button
          (click)="goToLogin()"
          class="group relative text-inverted/80 hover:text-inverted transition-colors p-1"
        >
          <span class="sr-only">Iniciar Sesión</span>
          <i
            class="fas fa-user text-2xl group-hover:drop-shadow-md transition-all"
          ></i>
          <span
            class="absolute -bottom-8 left-1/2 -translate-x-1/2 text-[10px] bg-black/80 text-white px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap"
          >
            Login
          </span>
        </button>

        <button
          (click)="handleCartClick()"
          [disabled]="!isHomePage"
          class="relative p-2 rounded-full text-inverted/80 hover:text-inverted transition-colors duration-200"
          [ngClass]="
            isHomePage
              ? 'hover:bg-white/10 cursor-pointer'
              : 'opacity-50 cursor-not-allowed'
          "
          aria-label="Ver carrito"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"
            />
          </svg>

          <span
            *ngIf="totalItems$ | async as count"
            class="absolute -top-1 -right-1 bg-accent text-white text-xs font-bold px-1.5 py-0.5 rounded-full border-2 border-brand"
          >
            {{ count }}
          </span>
        </button>
      </div>
    </div>
  </div>
</nav>
