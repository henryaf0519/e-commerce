<div class="relative w-full min-h-screen flex items-center justify-center overflow-hidden bg-gray-900">
    
    <div class="absolute inset-0 z-0">
        <img src="assets/imgs/hero.jpg" 
             alt="Fondo Dulcilandia" 
             class="w-full h-full object-cover object-center">
             
        <div class="absolute inset-0 bg-black/60"></div>

        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
    </div>

    <div class="relative z-10 max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 text-center pb-20">
        
        <h1 class="text-5xl font-extrabold tracking-tight text-white sm:text-6xl md:text-7xl drop-shadow-2xl">
            <span class="block text-accent text-2xl sm:text-4xl font-medium mb-4 font-handwriting tracking-wider">
                Bienvenido a
            </span>
            <span class="block text-white transform transition-transform duration-700 hover:scale-105 cursor-default">
                {{ title }}
            </span>
        </h1>
        
        <p class="mt-8 max-w-2xl mx-auto text-xl md:text-2xl text-gray-200 drop-shadow-lg font-light tracking-wide">
            {{ subtitle }}
        </p>
        
        <div class="mt-12 max-w-sm mx-auto sm:max-w-none sm:flex sm:justify-center gap-6">
            <a href="#" 
               (click)="scrollToCatalogo($event)"
               class="w-full flex items-center justify-center px-8 py-4 border border-transparent text-lg font-bold rounded-full text-white bg-brand hover:bg-white hover:text-brand transition-all shadow-xl hover:shadow-2xl hover:-translate-y-1">
               Ver Catálogo
            </a>

           
        </div>
    </div>
</div>
