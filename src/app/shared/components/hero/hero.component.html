<div
  class="relative w-full min-h-screen flex items-center justify-center overflow-hidden bg-gray-900"
>
  <div class="absolute inset-0 z-0">
    <img
      src="assets/imgs/hero.jpg"
      alt="Fondo Dulcilandia"
      class="w-full h-full object-cover object-center"
    />

    <div
      class="absolute inset-0 bg-gradient-to-t from-brand/80 via-transparent to-black/20"
    ></div>
  </div>

  <div
    class="relative z-10 max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 text-center pb-20"
  >
    <h1
      class="text-5xl font-extrabold tracking-tight text-white sm:text-6xl md:text-7xl drop-shadow-2xl"
    >
      <span
        class="block text-white/90 text-2xl sm:text-4xl font-medium mb-4 font-handwriting"
        >Bienvenido a</span
      >
      <span
        class="block text-white transform transition-transform duration-700 hover:scale-110 cursor-default"
      >
        {{ title }}
      </span>
    </h1>

    <p
      class="mt-8 max-w-2xl mx-auto text-xl md:text-2xl text-white/95 drop-shadow-lg font-medium"
    >
      {{ subtitle }}
    </p>

    <div
      class="mt-12 max-w-sm mx-auto sm:max-w-none sm:flex sm:justify-center gap-6"
    >
      <a
        href="#"
        (click)="scrollToCatalogo($event)"
        class="w-full flex items-center justify-center px-8 py-4 border border-transparent text-lg font-bold rounded-full text-brand bg-white hover:bg-gray-100 transition-all shadow-xl hover:shadow-2xl hover:-translate-y-1"
      >
        <i class="fas fa-candy-cane mr-2"></i> Ver Catálogo
      </a>
    </div>
  </div>
</div>
