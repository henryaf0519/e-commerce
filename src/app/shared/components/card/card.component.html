<div class="h-[450px] border border-muted/20 bg-surface rounded-lg shadow-lg p-6 hover:shadow-xl transition-shadow duration-300 ease-in-out cursor-pointer" (click)="onCardClick()">
    <div class="relative">
      <img [src]="products.images[0]" alt="Producto" class="w-full h-56 object-contain rounded-lg">
  
      <div *ngIf="products.isNew" class="absolute top-4 right-4 bg-brand text-inverted px-3 py-1 rounded-full text-xs font-semibold">Nuevo</div>
    </div>
  
    <div class="mt-4">
      <h3 class="h-[60px] text-xl md:text-2xl font-semibold text-main hover:text-brand transition-colors duration-200">{{products.name}}</h3>
      <p class="h-[40px] mt-2 text-sm text-muted line-clamp-2">{{products.description}}</p>
      
      <div class="flex justify-between items-center mt-4">
        <span class="text-lg md:text-xl font-bold text-main">$ {{products.price}}</span>
        <button class="bg-brand text-inverted py-2 px-4 rounded-full text-sm font-medium hover:brightness-110 focus:outline-none focus:ring-2 focus:ring-brand transition-all duration-300">
          Ver más
        </button>
      </div>
    </div>
</div>
