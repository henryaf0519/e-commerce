<div class="group relative w-full h-[510px] bg-white rounded-3xl shadow-lg hover:shadow-xl hover:shadow-black/5 transition-all duration-500 ease-in-out cursor-pointer overflow-hidden border border-black/[0.03]" 
     (click)="onCardClick()">
    
    <div class="absolute inset-0 w-full h-full">
        <img [src]="products.images[0]" 
             [alt]="products.name" 
             class="w-full h-full object-cover object-center transition-transform duration-700 ease-out group-hover:scale-105">

        <img *ngIf="products.images.length > 1"
             [src]="products.images[1]" 
             [alt]="products.name" 
             class="absolute inset-0 w-full h-full object-cover object-center transition-all duration-700 ease-out opacity-0 group-hover:opacity-100 group-hover:scale-105">
    </div>

    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/30 to-transparent opacity-95"></div>
  
    <div *ngIf="products.isNew" class="absolute top-4 right-4 z-20">
        <span class="bg-white/10 text-white text-[10px] font-bold px-3 py-1 rounded-full shadow-sm uppercase tracking-wider backdrop-blur-sm border border-white/10">
            Nuevo
        </span>
    </div>
  
    <div class="absolute bottom-0 left-0 right-0 p-5 z-20 flex flex-col gap-4">
      
      <div class="flex flex-col gap-1">
        <h3 class="text-xl font-bold text-white leading-tight truncate">
            {{products.name}}
        </h3>
        <div class="flex items-center gap-2.5">
            <span class="text-xl font-bold text-white">
                $ {{products.price}}
            </span>
            <span *ngIf="products.stock > 0 && products.stock <= 5" 
                  class="text-[10px] text-orange-200 px-2 py-0.5 rounded-full font-medium uppercase tracking-wider bg-white/5 backdrop-blur-sm border border-white/5">
                ¡Solo {{products.stock}}!
            </span>
        </div>
      </div>
  
      <div class="flex flex-col gap-3">
        
        <div class="flex items-center justify-between bg-black/10 backdrop-blur-md rounded-xl p-1 border border-white/5 shadow-inner"
             (click)="$event.stopPropagation()">
            
            <button (click)="decreaseQuantity($event)" 
                    [disabled]="quantity <= 1"
                    class="w-9 h-9 rounded-lg bg-white/5 text-white/70 font-light flex items-center justify-center hover:bg-white/10 hover:text-white disabled:opacity-20 transition-all active:scale-95 border border-white/5">
                <i class="fas fa-minus text-[10px]"></i>
            </button>

            <span class="text-white font-medium text-base px-3 cursor-default select-none tracking-tight">
                {{ quantity }}
            </span>

            <button (click)="increaseQuantity($event)" 
                    [disabled]="quantity >= products.stock"
                    class="w-9 h-9 rounded-lg bg-white/5 text-white/70 font-light flex items-center justify-center hover:bg-white/10 hover:text-white disabled:opacity-20 transition-all active:scale-95 border border-white/5">
                <i class="fas fa-plus text-[10px]"></i>
            </button>
        </div>
        
        <button (click)="onAddToCart($event)"
                [disabled]="products.stock === 0"
                class="w-full h-12 bg-orange-600 text-white font-semibold rounded-xl hover:bg-orange-700 transition-all duration-300 flex items-center justify-center gap-2 active:scale-95 disabled:bg-gray-600 disabled:text-gray-400 disabled:shadow-none uppercase tracking-wider text-xs shadow-md border border-orange-700/50">
            
            <i class="fas text-sm" [ngClass]="products.stock === 0 ? 'fa-ban' : 'fa-shopping-bag'"></i>
            
            <span>
                {{ (products.stock === 0 ? 'PRODUCTS.OUT_OF_STOCK' : 'PRODUCTS.ADD_TO_CART') | translate }}
            </span>
        </button>

      </div>
    </div>
</div>
